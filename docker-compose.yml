version: '3.9'

services:
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - 5432:5432

  adminer:
    image: adminer
    restart: always
    ports:
      - 8081:8080

  server:
    build: .
    ports:
      - 6060:6060
    environment:
      DATABASE_URL: postgresql://root:root@db:5432/db
    depends_on:
      - db

volumes:
  pgdata:
